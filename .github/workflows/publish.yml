name: Publish Scheduled Articles

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish articles due today
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          echo "Today is: $TODAY"
          PUBLISHED=0

          for file in scheduled/2*.html; do
            echo "Found: $file"
            [ -f "$file" ] || continue

            FILENAME=$(basename "$file")
            FILE_DATE="${FILENAME:0:10}"
            echo "File date: $FILE_DATE"

            if [[ "$FILE_DATE" < "$TODAY" || "$FILE_DATE" == "$TODAY" ]]; then
              SLUG="${FILENAME:11}"
              echo "Publishing $SLUG"
              cp "$file" "blog/$SLUG"
              rm "$file"
              PUBLISHED=$((PUBLISHED + 1))

              SLUG_URL="https://lemonlawhandbook.com/blog/$SLUG"
              if ! grep -q "$SLUG" sitemap.xml 2>/dev/null; then
                sed -i "s|</urlset>|  <url><loc>$SLUG_URL</loc><changefreq>monthly</changefreq><priority>0.8</priority></url>\n</urlset>|" sitemap.xml
                echo "Added to sitemap"
              fi
            else
              echo "Not due yet: $FILENAME"
            fi
          done

          echo "Total published: $PUBLISHED"

          if [ "$PUBLISHED" -gt 0 ]; then
            git config user.name "Lemon Law Handbook Bot"
            git config user.email "action@github.com"
            git add -A
            git commit -m "Auto-published $PUBLISHED article(s) for $TODAY"
            git push
          else
            echo "Nothing to publish today"
          fi
