name: Publish Scheduled Articles

on:
  schedule:
    - cron: '0 14 * * *'  # Runs every day at 9am Central Time (14:00 UTC)
  workflow_dispatch:        # Also lets you trigger it manually from GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish articles due today
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          echo "Today's date: $TODAY"

          PUBLISHED=0

          # Check scheduled folder for articles due today or earlier
          if [ -d "scheduled" ]; then
            for file in scheduled/*.html; do
              [ -f "$file" ] || continue

              FILENAME=$(basename "$file")
              # Extract date from filename (expects format: YYYY-MM-DD-article-slug.html)
              FILE_DATE=$(echo "$FILENAME" | grep -oP '^\d{4}-\d{2}-\d{2}')

              if [ -z "$FILE_DATE" ]; then
                echo "Skipping $FILENAME — no date found in filename"
                continue
              fi

              if [[ "$FILE_DATE" <= "$TODAY" ]]; then
                echo "Publishing: $FILENAME (scheduled for $FILE_DATE)"

                # Move article to the blog folder
                mv "$file" "blog/$FILENAME"

                # Remove the date prefix from the filename in blog/
                SLUG=$(echo "$FILENAME" | sed 's/^\d\{4\}-\d\{2\}-\d\{2\}-//')
                SLUG=$(echo "$FILENAME" | grep -oP '(?<=^\d{4}-\d{2}-\d{2}-).*')
                mv "blog/$FILENAME" "blog/$SLUG"

                echo "Moved to: blog/$SLUG"
                PUBLISHED=$((PUBLISHED + 1))

                # Add to sitemap if not already present
                SLUG_URL="https://lemonlawhandbook.com/blog/$SLUG"
                if ! grep -q "$SLUG_URL" sitemap.xml; then
                  SITEMAP_ENTRY="  <url>\n    <loc>$SLUG_URL</loc>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>"
                  sed -i "s|</urlset>|$SITEMAP_ENTRY\n</urlset>|" sitemap.xml
                  echo "Added to sitemap: $SLUG_URL"
                fi
              else
                echo "Not yet due: $FILENAME (scheduled for $FILE_DATE)"
              fi
            done
          else
            echo "No scheduled folder found — creating it"
            mkdir -p scheduled
          fi

          echo "Articles published today: $PUBLISHED"

          # Only commit if something was published
          if [ $PUBLISHED -gt 0 ]; then
            git config user.name "Lemon Law Handbook Bot"
            git config user.email "action@github.com"
            git add blog/ sitemap.xml scheduled/
            git commit -m "Published $PUBLISHED article(s) for $TODAY"
            git push
            echo "Changes committed and pushed — Netlify will redeploy automatically"
          else
            echo "Nothing to publish today"
          fi
